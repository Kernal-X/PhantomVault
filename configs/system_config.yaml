# System Configuration
# General system settings

system:
  name: Agentic Security System
  version: 1.0.0
  environment: development

logging:
  level: INFO
  format: json
  output: console

inference:
  batch_size: 32
  timeout: 30
  retry_attempts: 3

storage:
  data_dir: ./data
  model_dir: ./models
  log_dir: ./logs

monitoring:
  poll_interval: 1
  recursive: true
  console_reporting: true
  file_watch_paths:
    - ${USERPROFILE}\Documents
    - ${USERPROFILE}\Desktop
    - .\demo_shared
